version=0.8.0
org.gradle.configuration-cache=false
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.daemon.idletimeout=60000
org.gradle.jvmargs=-Xmx1536m -Dfile.encoding=UTF-8
# Kein org.gradle.java.home hier (war früher ein maschinen-spezifischer Pfad —
# P1-OSS-Blocker: jeder Fremd-Clone scheitert sonst am 1. ./gradlew). Der
# foojay-resolver (settings.gradle.kts) + auto-download provisionieren JDK 21
# selbst, wenn lokal nur ein neueres/älteres JDK vorhanden ist — verifiziert
# 2026-07-11 mit frischem GRADLE_USER_HOME (kein JDK/keine Gradle-Distribution
# vorab gecacht): ./gradlew lädt Gradle + JDK 21 selbst und baut grün.
org.gradle.java.installations.auto-download=true
